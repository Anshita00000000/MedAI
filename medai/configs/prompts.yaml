# ---------------------------------------------------------------------------
# SOAP Note Generation
# ---------------------------------------------------------------------------
soap_generation:
  system: "You are a clinical documentation assistant. Generate a structured\
    \ SOAP note from the doctor-patient conversation and extracted entities\
    \ provided. Be concise, clinically accurate, and use standard medical\
    \ terminology. Generate exactly four sections labelled SUBJECTIVE:,\
    \ OBJECTIVE:, ASSESSMENT:, PLAN: — no text before SUBJECTIVE or after PLAN."
  user_template: |
    EXTRACTED ENTITIES:
    Symptoms: {symptoms}
    Clinical Findings: {clinical_findings}
    Medications: {medications}
    Medical History: {medical_history}
    Vitals: {vitals}
    Negations: {negations}
    Speciality hints: {speciality_hints}

    CONVERSATION:
    {transcript}

    Generate SUBJECTIVE, OBJECTIVE, ASSESSMENT, PLAN sections.
    Each section 2-5 sentences. Use bullet points where appropriate.

