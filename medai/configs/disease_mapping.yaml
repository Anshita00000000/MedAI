# disease_mapping.yaml
# Disease keyword mappings used by DDxEngine for rule-based differential diagnosis.
# Each entry defines keywords that suggest the diagnosis and a min_matches threshold.
#
# Format:
#   <speciality>:
#     - name: <full disease name>
#       icd10: <ICD-10-CM code>
#       keywords: [list of symptom/finding keywords]
#       min_matches: <minimum keyword hits required to include diagnosis>

disease_mapping:
  respiratory:
    - name: "Community Acquired Pneumonia"
      icd10: "J18.9"
      keywords:
        - fever
        - cough
        - shortness of breath
        - chest pain
        - sputum
      min_matches: 3

    - name: "Asthma Exacerbation"
      icd10: "J45.901"
      keywords:
        - wheezing
        - shortness of breath
        - chest tightness
        - inhaler
      min_matches: 2

    - name: "COPD Exacerbation"
      icd10: "J44.1"
      keywords:
        - copd
        - emphysema
        - chronic bronchitis
        - dyspnea
        - inhaler
      min_matches: 2

  cardiac:
    - name: "Acute Coronary Syndrome"
      icd10: "I24.9"
      keywords:
        - chest pain
        - chest pressure
        - radiating pain
        - diaphoresis
        - nausea
      min_matches: 2

    - name: "Heart Failure"
      icd10: "I50.9"
      keywords:
        - shortness of breath
        - edema
        - fatigue
        - orthopnea
      min_matches: 2

  neurological:
    - name: "Migraine"
      icd10: "G43.909"
      keywords:
        - headache
        - nausea
        - light sensitivity
        - visual aura
        - blurry vision
      min_matches: 2

    - name: "Ischemic Stroke"
      icd10: "I63.9"
      keywords:
        - facial droop
        - arm weakness
        - speech difficulty
        - sudden headache
      min_matches: 2

    - name: "Tension Headache"
      icd10: "G44.209"
      keywords:
        - headache
        - stress
        - bilateral
        - pressure
      min_matches: 2

  gastrointestinal:
    - name: "Gastroenteritis"
      icd10: "K59.1"
      keywords:
        - nausea
        - vomiting
        - diarrhea
        - abdominal pain
        - fever
      min_matches: 3

    - name: "GERD"
      icd10: "K21.0"
      keywords:
        - heartburn
        - acid reflux
        - chest burning
        - regurgitation
      min_matches: 2

  musculoskeletal:
    - name: "Osteoarthritis"
      icd10: "M19.90"
      keywords:
        - joint pain
        - stiffness
        - swelling
        - osteoarthritis
        - knee pain
      min_matches: 2

    - name: "Lower Back Pain"
      icd10: "M54.5"
      keywords:
        - back pain
        - lower back
        - lumbar
        - sciatica
      min_matches: 2

  infectious:
    - name: "Upper Respiratory Tract Infection"
      icd10: "J06.9"
      keywords:
        - sore throat
        - runny nose
        - congestion
        - cough
        - fever
      min_matches: 3

    - name: "Urinary Tract Infection"
      icd10: "N39.0"
      keywords:
        - burning urination
        - frequent urination
        - dysuria
        - cloudy urine
      min_matches: 2
