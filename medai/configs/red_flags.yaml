# red_flags.yaml
# Rule-based red flag definitions loaded by RedFlagDetector.
# Each flag has a severity level, trigger keywords/phrases, and a
# human-readable description for the report.
#
# severity levels:
#   URGENT  — requires same-day or emergency escalation
#   WARNING — requires prompt (within 48 h) follow-up or referral
#   WATCH   — note and monitor; reassess at next visit
